name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: release

    steps:
      - uses: actions/checkout@v7
      - run: pip install build
      - run: python -m build --sdist
      - uses: pypa/gh-action-pypi-publish@release/v1
